# ============================================================
# Application Configuration — Development (H2 file-based)
# ============================================================

# Application Name
spring.application.name=author-book-management

# Server Configuration
server.port=8082
server.error.include-message=always
server.error.include-binding-errors=always

# ── Database ─────────────────────────────────────────────────
# H2 file-based (persistent). AUTO_SERVER=TRUE allows multiple
# JVM connections simultaneously without file-lock errors.

spring.datasource.driver-class-name=org.h2.Driver

# spring.datasource.url=jdbc:h2:file:./data/librarydb;AUTO_SERVER=TRUE (file-based)
## Defaults for local development and CI (in-memory H2).
# If DB_URL/DB_USERNAME/DB_PASSWORD are set in the environment, they will override these.
spring.datasource.url=${DB_URL:jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Web Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────
# NOTE: database-platform is intentionally omitted — Hibernate 6
# auto-detects H2 dialect (avoids HHH90000025 warning).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
# FIX: was com.library.management (wrong package) — now correct
logging.level.com.example.library=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
# Set to DEBUG only when diagnosing query issues; INFO keeps logs clean in dev
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file with rolling policy (FIX: deprecated logging.file.max-* removed)
logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
logging.logback.rollingpolicy.file-name-pattern=logs/application-%d{yyyy-MM-dd}.%i.log

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
